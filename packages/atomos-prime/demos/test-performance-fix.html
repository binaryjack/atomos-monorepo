<!DOCTYPE html>
<html>
<head>
  <title>VBE2 - Performance Fix Test</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }
    
    .status-panel {
      background: #f0f0f0;
      border: 1px solid #ccc;
      padding: 15px;
      margin: 10px 0;
      border-radius: 8px;
    }
    
    .controls {
      margin: 20px 0;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    
    button {
      padding: 10px 15px;
      font-size: 14px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      background: #007acc;
      color: white;
    }
    
    button:hover {
      background: #005999;
    }
    
    .success { background: #28a745 !important; }
    .warning { background: #ffc107 !important; color: #333; }
    .danger { background: #dc3545 !important; }
    
    #localStorage-status {
      font-family: monospace;
      font-size: 12px;
      background: #f8f9fa;
      border: 1px solid #e9ecef;
      padding: 10px;
      margin: 10px 0;
      border-radius: 4px;
      max-height: 200px;
      overflow-y: auto;
    }
    
    #performance-metrics {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 10px;
      margin: 10px 0;
    }
    
    .metric {
      background: #e9ecef;
      padding: 10px;
      border-radius: 4px;
      text-align: center;
    }
    
    .metric-value {
      font-size: 24px;
      font-weight: bold;
      color: #007acc;
    }
  </style>
<script type="importmap">{`n"imports":{`n"@binaryjack/formular.dev":"/formular-dev/dist/formular-dev.es.js",`n"@atomos/structura-core":"/atomos-structura-core/dist/index.js",`n"@atomos/prime-style":"/atomos-prime-style/dist/index.js"`n}`n}</script></head>
<body>
  <h1>🚀 VBE2 Performance Fix Validation</h1>
  <p>This page tests the localStorage quota fix and debounced entity movement persistence.</p>

  <div class="status-panel">
    <h3>📊 Performance Metrics</h3>
    <div id="performance-metrics">
      <div class="metric">
        <div class="metric-value" id="persist-calls">0</div>
        <div>Persist Calls</div>
      </div>
      <div class="metric">
        <div class="metric-value" id="debounced-saves">0</div>
        <div>Debounced Saves</div>
      </div>
      <div class="metric">
        <div class="metric-value" id="quota-errors">0</div>
        <div>Quota Errors</div>
      </div>
      <div class="metric">
        <div class="metric-value" id="storage-size">0</div>
        <div>Storage Size (KB)</div>
      </div>
    </div>
  </div>

  <div class="controls">
    <button onclick="testDebouncedMovement()" class="success">🎯 Test Debounced Movement</button>
    <button onclick="testQuotaManagement()" class="warning">💾 Test Quota Management</button>
    <button onclick="clearAllStorage()" class="danger">🧹 Clear All Storage</button>
    <button onclick="refreshStorageStatus()">📋 Refresh Status</button>
    <button onclick="openCanvas()">🖼️ Open Canvas</button>
  </div>

  <div class="status-panel">
    <h3>💾 localStorage Status</h3>
    <div id="localStorage-status">Loading...</div>
  </div>

  <script type="module">
    let performanceCounters = {
      persistCalls: 0,
      debouncedSaves: 0,
      quotaErrors: 0,
      storageSize: 0
    };

    // Mock entity movement simulation to test debouncing
    window.testDebouncedMovement = async function() {
      console.log('🎯 Testing debounced movement...');
      const testData = { entityId: 'test-entity', positions: [] };
      
      // Simulate rapid mouse movements (should be debounced)
      for (let i = 0; i < 50; i++) {
        const pos = { x: Math.random() * 800, y: Math.random() * 600 };
        testData.positions.push(pos);
        
        try {
          // This simulates the old behavior that would cause quota issues
          localStorage.setItem(\`vbe2:movement-\${i}\`, JSON.stringify(pos));
          performanceCounters.persistCalls++;
        } catch (error) {
          if (error.name === 'QuotaExceededError') {
            performanceCounters.quotaErrors++;
            console.warn('Quota exceeded detected - cleanup should trigger');
          }
        }
      }
      
      // Clean up test data
      for (let i = 0; i < 50; i++) {
        localStorage.removeItem(\`vbe2:movement-\${i}\`);
      }
      
      performanceCounters.debouncedSaves++; // In real scenario, this would be much lower
      updateMetrics();
      console.log('✅ Debounced movement test completed');
    };

    // Test quota management by filling localStorage
    window.testQuotaManagement = function() {
      console.log('💾 Testing quota management...');
      
      try {
        // Try to fill localStorage with dummy data
        let i = 0;
        while (i < 1000) {
          const largeData = 'x'.repeat(10000); // 10KB chunks
          localStorage.setItem(\`test-large-data-\${i}\`, largeData);
          i++;
        }
      } catch (error) {
        if (error.name === 'QuotaExceededError') {
          performanceCounters.quotaErrors++;
          console.log('✅ Quota exceeded triggered - cleanup logic should activate');
        }
      }
      
      updateMetrics();
    };

    // Clear all localStorage
    window.clearAllStorage = function() {
      const beforeSize = getStorageSize();
      localStorage.clear();
      const afterSize = getStorageSize();
      console.log(\`🧹 Cleared \${Math.round((beforeSize - afterSize) / 1024)}KB from localStorage\`);
      
      // Reset counters
      performanceCounters = {
        persistCalls: 0,
        debouncedSaves: 0,
        quotaErrors: 0,
        storageSize: 0
      };
      
      updateMetrics();
      refreshStorageStatus();
    };

    // Refresh storage status display
    window.refreshStorageStatus = function() {
      const statusDiv = document.getElementById('localStorage-status');
      let statusHTML = '';
      
      // Show VBE2 keys
      const vbe2Keys = [];
      for (let i = 0; i < localStorage.length; i++) {
        const key = localStorage.key(i);
        if (key && key.startsWith('vbe2:')) {
          const value = localStorage.getItem(key);
          const size = value ? Math.round(value.length / 1024) : 0;
          vbe2Keys.push({ key, size });
        }
      }
      
      if (vbe2Keys.length === 0) {
        statusHTML = '<em>No VBE2 localStorage keys found - clean slate!</em>';
      } else {
        statusHTML = '<strong>VBE2 localStorage Keys:</strong><br>';
        vbe2Keys.forEach(({ key, size }) => {
          statusHTML += \`• \${key}: \${size}KB<br>\`;
        });
      }
      
      statusHTML += \`<br><strong>Total localStorage Usage:</strong> \${Math.round(getStorageSize() / 1024)}KB\`;
      statusDiv.innerHTML = statusHTML;
      
      performanceCounters.storageSize = Math.round(getStorageSize() / 1024);
      updateMetrics();
    };

    // Open canvas page for real testing
    window.openCanvas = function() {
      window.open('canvas.html', '_blank');
    };

    // Calculate localStorage size
    function getStorageSize() {
      let total = 0;
      for (let i = 0; i < localStorage.length; i++) {
        const key = localStorage.key(i);
        if (key) {
          const value = localStorage.getItem(key);
          if (value) {
            total += key.length + value.length;
          }
        }
      }
      return total;
    }

    // Update performance metrics display
    function updateMetrics() {
      document.getElementById('persist-calls').textContent = performanceCounters.persistCalls;
      document.getElementById('debounced-saves').textContent = performanceCounters.debouncedSaves;
      document.getElementById('quota-errors').textContent = performanceCounters.quotaErrors;
      document.getElementById('storage-size').textContent = performanceCounters.storageSize;
    }

    // Initialize
    refreshStorageStatus();
    updateMetrics();
    
    console.log('🚀 Performance test page ready!');
    console.log('📋 Available functions:', {
      testDebouncedMovement: 'Simulates rapid entity movements',
      testQuotaManagement: 'Tests localStorage quota handling', 
      clearAllStorage: 'Clears all localStorage data',
      refreshStorageStatus: 'Updates storage status display',
      openCanvas: 'Opens the canvas for real testing'
    });
  </script>
</body>
</html>
