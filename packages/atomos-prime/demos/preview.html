<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VBS Web UI Components Preview</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎨</text></svg>">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    // Configure Tailwind with VBS theme
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: {
              50: '#eff6ff',
              100: '#dbeafe', 
              200: '#bfdbfe',
              300: '#93c5fd',
              400: '#60a5fa',
              500: '#3b82f6',
              600: '#2563eb',
              700: '#1d4ed8',
              800: '#1e40af',
              900: '#1e3a8a',
              950: '#172554'
            },
            secondary: {
              50: '#f9fafb',
              100: '#f3f4f6',
              200: '#e5e7eb',
              300: '#d1d5db',
              400: '#9ca3af',
              500: '#6b7280',
              600: '#4b5563',
              700: '#374151',
              800: '#1f2937',
              900: '#111827',
              950: '#030712'
            },
            success: {
              50: '#ecfdf5',
              500: '#10b981',
              900: '#064e3b'
            },
            warning: {
              50: '#fffbeb',
              500: '#f59e0b',
              900: '#78350f'
            },
            danger: {
              50: '#fef2f2',
              500: '#ef4444',
              900: '#7f1d1d'
            }
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
            mono: ['JetBrains Mono', 'Monaco', 'monospace']
          },
          animation: {
            'fade-in': 'fadeIn 0.3s ease-in-out',
            'slide-in': 'slideIn 0.3s ease-out',
            'scale-in': 'scaleIn 0.2s ease-out'
          },
          keyframes: {
            fadeIn: {
              '0%': { opacity: '0' },
              '100%': { opacity: '1' }
            },
            slideIn: {
              '0%': { transform: 'translateY(-10px)', opacity: '0' },
              '100%': { transform: 'translateY(0)', opacity: '1' }
            },
            scaleIn: {
              '0%': { transform: 'scale(0.95)', opacity: '0' },
              '100%': { transform: 'scale(1)', opacity: '1' }
            }
          }
        }
      }
    };
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100..900&family=JetBrains+Mono:wght@100..800&display=swap');
    
    /* Custom CSS for enhanced theming */
    .component-showcase {
      animation: fadeIn 0.5s ease-in-out;
    }
    
    /* Smooth transitions for theme switching */
    * {
      transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
    }
    
    /* Custom scrollbar for dark mode */
    ::-webkit-scrollbar {
      width: 8px;
    }
    
    ::-webkit-scrollbar-track {
      background: theme('colors.gray.100');
    }
    
    .dark ::-webkit-scrollbar-track {
      background: theme('colors.gray.800');
    }
    
    ::-webkit-scrollbar-thumb {
      background: theme('colors.gray.400');
      border-radius: 4px;
    }
    
    .dark ::-webkit-scrollbar-thumb {
      background: theme('colors.gray.600');
    }
    
    ::-webkit-scrollbar-thumb:hover {
      background: theme('colors.gray.500');
    }
    
    .dark ::-webkit-scrollbar-thumb:hover {
      background: theme('colors.gray.500');
    }
  </style>
</head>
<body class="font-sans antialiased">
  <nav style="position:sticky;top:0;z-index:999;background:rgba(255,255,255,0.92);backdrop-filter:blur(8px);border-bottom:1px solid #e5e7eb;display:flex;align-items:center;gap:8px;padding:0 16px;height:40px;font-family:system-ui,sans-serif;font-size:13px;">
    <span style="font-weight:700;color:#1e293b;margin-right:8px;">VBS</span>
    <a href="preview.html" style="color:#3b82f6;text-decoration:none;font-weight:500;padding:4px 10px;border-radius:6px;background:#eff6ff;">Components</a>
    <a href="canvas.html" style="color:#6b7280;text-decoration:none;padding:4px 10px;border-radius:6px;" onmouseover="this.style.background='#f1f5f9'" onmouseout="this.style.background=''">Canvas</a>
    <a href="modal.html" style="color:#6b7280;text-decoration:none;padding:4px 10px;border-radius:6px;" onmouseover="this.style.background='#f1f5f9'" onmouseout="this.style.background=''">Modal</a>
    <a href="formular.html" style="color:#6b7280;text-decoration:none;padding:4px 10px;border-radius:6px;" onmouseover="this.style.background='#f1f5f9'" onmouseout="this.style.background=''">Formular</a>
  </nav>
  <div id="preview-root" class="component-showcase"></div>
  
  <script type="module">
    import { createPreviewPage } from './dist/preview/create-preview-page.js';
    
    // Initialize the preview page
    const preview = createPreviewPage();
    document.getElementById('preview-root').appendChild(preview.element);
    
    // Add keyboard shortcuts
    document.addEventListener('keydown', (e) => {
      // Toggle theme with Ctrl/Cmd + D
      if ((e.ctrlKey || e.metaKey) && e.key === 'd') {
        e.preventDefault();
        const themeButton = document.querySelector('button[class*="outline"]');
        if (themeButton) themeButton.click();
      }
    });
    
    // Cleanup on page unload
    window.addEventListener('beforeunload', () => {
      preview.cleanup.destroy();
    });
    
    // Add development helpers
    if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
      console.log('🎨 VBS Web UI Preview loaded');
      console.log('💡 Press Ctrl/Cmd + D to toggle theme');
      console.log('🔧 Components available:', Object.keys(window));
    }
  </script>
</body>
</html>
