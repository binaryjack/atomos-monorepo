<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VBS Modal</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🪟</text></svg>">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; min-height: 100%; background: #0f172a; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
  </style>
  <script type="importmap">
  {
    "imports": {
      "@binaryjack/formular.dev": "./node_modules/@binaryjack/formular.dev/dist/formular-dev.es.js"
    }
  }
  </script>
</head>
<body>
  <nav style="position:sticky;top:0;z-index:999;background:rgba(15,23,42,0.92);backdrop-filter:blur(8px);border-bottom:1px solid #1e293b;display:flex;align-items:center;gap:8px;padding:0 16px;height:40px;font-family:system-ui,sans-serif;font-size:13px;">
    <span style="font-weight:700;color:#f1f5f9;margin-right:8px;">VBS</span>
    <a href="preview.html" style="color:#94a3b8;text-decoration:none;padding:4px 10px;border-radius:6px;" onmouseover="this.style.background='#1e293b'" onmouseout="this.style.background=''">Components</a>
    <a href="canvas.html"  style="color:#94a3b8;text-decoration:none;padding:4px 10px;border-radius:6px;" onmouseover="this.style.background='#1e293b'" onmouseout="this.style.background=''">Canvas</a>
    <a href="modal.html"   style="color:#38bdf8;text-decoration:none;font-weight:500;padding:4px 10px;border-radius:6px;background:#0f2744;">Modal</a>
    <a href="formular.html" style="color:#94a3b8;text-decoration:none;padding:4px 10px;border-radius:6px;" onmouseover="this.style.background='#1e293b'" onmouseout="this.style.background=''">Formular</a>
  </nav>
  <div id="modal-root"></div>
  <script type="module">
    import { createModalPage } from './dist/preview/create-modal-page.js';

    const page = createModalPage();
    document.getElementById('modal-root').appendChild(page.element);

    window.addEventListener('beforeunload', () => page.cleanup.destroy());
  </script>
</body>
</html>
