<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VBS Web-UI Component Demo</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-4xl mx-auto bg-white rounded-lg shadow-lg p-8">
        <div id="demo-container">
            <!-- Components will be rendered here -->
        </div>
    </div>
    
    <script type="module">
        import {
            createSignal,
            createTypography,
            createInput,
            createButton,
            createCheckbox,
            createTextarea,
            createSkeleton,
            createDropdown,
            createSvgRectangle,
            createSvgLine,
            createEntityFrame
        } from '../dist/index.js';
        
        const container = document.getElementById('demo-container');
        
        // Create reactive signals
        const nameSignal = createSignal('John Doe');
        const enabledSignal = createSignal(true);
        const descriptionSignal = createSignal('Enter your description here...');
        
        // Typography demos
        const title = createTypography({
            variant: 'h1',
            children: 'VBS Web-UI Component Demo',
            className: 'text-center mb-8 text-blue-600'
        });
        container.appendChild(title.element);
        
        const subtitle = createTypography({
            variant: 'h2',
            children: 'Atomic Components Showcase',
            className: 'mb-6 text-gray-800'
        });
        container.appendChild(subtitle.element);
        
        // Input components section
        const inputSection = document.createElement('div');
        inputSection.className = 'mb-8 p-4 border border-gray-200 rounded-lg';
        
        const inputTitle = createTypography({
            variant: 'h3',
            children: 'Input Components',
            className: 'mb-4 text-gray-700'
        });
        inputSection.appendChild(inputTitle.element);
        
        // Regular input with signal binding
        const nameInput = createInput({
            type: 'text',
            placeholder: 'Enter your name',
            value: nameSignal,
            className: 'mb-4',
            onInput: (value) => nameSignal.set(value)
        });
        inputSection.appendChild(nameInput.element);
        
        // Dynamic label showing signal value
        const nameLabel = createTypography({
            variant: 'p',
            children: nameSignal,
            className: 'mb-4 text-sm text-gray-600'
        });
        inputSection.appendChild(nameLabel.element);
        
        // Checkbox with signal
        const enabledCheckbox = createCheckbox({
            checked: enabledSignal,
            onChange: (checked) => enabledSignal.set(checked)
        });
        inputSection.appendChild(enabledCheckbox.element);
        
        const checkboxLabel = createTypography({
            variant: 'span',
            children: 'Enable advanced features',
            className: 'ml-2'
        });
        inputSection.appendChild(checkboxLabel.element);
        
        // Textarea
        const descriptionTextarea = createTextarea({
            value: descriptionSignal,
            rows: 3,
            className: 'mt-4',
            onChange: (value) => descriptionSignal.set(value)
        });
        inputSection.appendChild(descriptionTextarea.element);
        
        // Dropdown
        const categoryDropdown = createDropdown({
            placeholder: 'Select category',
            options: [
                { value: 'design', label: 'Design' },
                { value: 'development', label: 'Development' },
                { value: 'testing', label: 'Testing' }
            ],
            className: 'mt-4'
        });
        inputSection.appendChild(categoryDropdown.element);
        
        container.appendChild(inputSection);
        
        // Button section
        const buttonSection = document.createElement('div');
        buttonSection.className = 'mb-8 p-4 border border-gray-200 rounded-lg';
        
        const buttonTitle = createTypography({
            variant: 'h3',
            children: 'Button Variants',
            className: 'mb-4 text-gray-700'
        });
        buttonSection.appendChild(buttonTitle.element);
        
        const buttonContainer = document.createElement('div');
        buttonContainer.className = 'flex flex-wrap gap-4';
        
        const primaryBtn = createButton({
            variant: 'primary',
            size: 'md',
            children: 'Primary Button',
            onClick: () => alert('Primary clicked!')
        });
        buttonContainer.appendChild(primaryBtn.element);
        
        const secondaryBtn = createButton({
            variant: 'secondary',
            size: 'md',
            children: 'Secondary Button'
        });
        buttonContainer.appendChild(secondaryBtn.element);
        
        const outlineBtn = createButton({
            variant: 'outline',
            size: 'sm',
            children: 'Outline Small'
        });
        buttonContainer.appendChild(outlineBtn.element);
        
        const ghostBtn = createButton({
            variant: 'ghost',
            size: 'lg',
            children: 'Ghost Large'
        });
        buttonContainer.appendChild(ghostBtn.element);
        
        buttonSection.appendChild(buttonContainer);
        container.appendChild(buttonSection);
        
        // Skeleton section
        const skeletonSection = document.createElement('div');
        skeletonSection.className = 'mb-8 p-4 border border-gray-200 rounded-lg';
        
        const skeletonTitle = createTypography({
            variant: 'h3',
            children: 'Loading Skeletons',
            className: 'mb-4 text-gray-700'
        });
        skeletonSection.appendChild(skeletonTitle.element);
        
        const skeletonContainer = document.createElement('div');
        skeletonContainer.className = 'space-y-4';
        
        const textSkeleton = createSkeleton({
            variant: 'text',
            width: '60%',
            className: 'mb-2'
        });
        skeletonContainer.appendChild(textSkeleton.element);
        
        const circularSkeleton = createSkeleton({
            variant: 'circular',
            width: 40,
            height: 40
        });
        skeletonContainer.appendChild(circularSkeleton.element);
        
        const rectangularSkeleton = createSkeleton({
            variant: 'rectangular',
            width: '100%',
            height: 120
        });
        skeletonContainer.appendChild(rectangularSkeleton.element);
        
        skeletonSection.appendChild(skeletonContainer);
        container.appendChild(skeletonSection);
        
        // SVG section
        const svgSection = document.createElement('div');
        svgSection.className = 'mb-8 p-4 border border-gray-200 rounded-lg';
        
        const svgTitle = createTypography({
            variant: 'h3',
            children: 'SVG Components',
            className: 'mb-4 text-gray-700'
        });
        svgSection.appendChild(svgTitle.element);
        
        const svgContainer = document.createElement('div');
        svgContainer.className = 'flex items-center gap-4';
        
        const rectangle = createSvgRectangle({
            width: 100,
            height: 60,
            fill: '#3B82F6',
            stroke: '#1E40AF',
            strokeWidth: 2
        });
        svgContainer.appendChild(rectangle.element);
        
        const line = createSvgLine({
            x1: 0,
            y1: 0,
            x2: 100,
            y2: 50,
            stroke: '#EF4444',
            strokeWidth: 3
        });
        svgContainer.appendChild(line.element);
        
        svgSection.appendChild(svgContainer);
        container.appendChild(svgSection);
        
        // Entity frame molecule
        const entitySection = document.createElement('div');
        entitySection.className = 'p-4 border border-gray-200 rounded-lg';
        
        const entityTitle = createTypography({
            variant: 'h3',
            children: 'Entity Frame (Molecule)',
            className: 'mb-4 text-gray-700'
        });
        entitySection.appendChild(entityTitle.element);
        
        const entityFrame = createEntityFrame({
            title: 'User Entity',
            subtitle: 'Core business object',
            width: 200,
            height: 150,
            onTitleClick: () => alert('Entity clicked!')
        });
        entitySection.appendChild(entityFrame.element);
        
        container.appendChild(entitySection);
    </script>
</body>
</html>
