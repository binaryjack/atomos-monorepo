<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VBS Canvas</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0f172a; }
  </style>
  <script type="importmap">
  {
    "imports": {
      "@binaryjack/formular.dev": "/formular-dev/dist/formular-dev.es.js",
      "@atomos/structura-core": "/atomos-structura-core/dist/index.js",
      "@atomos/prime-style": "/atomos-prime-style/dist/index.js",
      "@atomos/structura": "/atomos-structura/dist/index.js"
    }
  }
  </script>
</head>
<body>
  <nav style="position:fixed;top:0;left:0;right:0;z-index:999;background:rgba(15,23,42,0.92);backdrop-filter:blur(8px);border-bottom:1px solid #1e293b;display:flex;align-items:center;gap:8px;padding:0 16px;height:40px;font-family:system-ui,sans-serif;font-size:13px;pointer-events:auto;">
    <span style="font-weight:700;color:#f1f5f9;margin-right:8px;">VBS</span>
    <a href="preview.html" style="color:#94a3b8;text-decoration:none;padding:4px 10px;border-radius:6px;" onmouseover="this.style.background='#1e293b'" onmouseout="this.style.background=''">Components</a>
    <a href="canvas.html" style="color:#38bdf8;text-decoration:none;font-weight:500;padding:4px 10px;border-radius:6px;background:#0f2744;">Canvas</a>
    <a href="modal.html" style="color:#94a3b8;text-decoration:none;padding:4px 10px;border-radius:6px;" onmouseover="this.style.background='#1e293b'" onmouseout="this.style.background=''">Modal</a>
    <a href="formular.html" style="color:#94a3b8;text-decoration:none;padding:4px 10px;border-radius:6px;" onmouseover="this.style.background='#1e293b'" onmouseout="this.style.background=''">Formular</a> <a href="test-stepper.html" style="color:#94a3b8;text-decoration:none;padding:4px 10px;border-radius:6px;" onmouseover="this.style.background='#1e293b'" onmouseout="this.style.background=''">Stepper</a>
  </nav>
  <div id="canvas-root"></div>
  <script type="module">
    import { createCanvasPage } from '/atomos-prime/dist/preview/create-canvas-page.js';
    import { getEntityManager } from '/atomos-prime/dist/index.js';
    import { createSchemaGraphKernel, createKernelAdapter } from '/atomos-structura/dist/index.js';

    console.log('🚀 Starting canvas with Kernel bridge');
    const page = createCanvasPage();
    document.getElementById('canvas-root').appendChild(page.element);

    // Boot the headless schema kernel
    const kernel = createSchemaGraphKernel();

    // Wire the kernel to the existing UI EntityManager (non-breaking bridge)
    const bridge = createKernelAdapter(kernel, getEntityManager());

    // Expose for console / DevTools debugging
    window.__kernel = kernel;
    window.__bridge = bridge;

    window.addEventListener('beforeunload', () => {
      bridge.destroy();
      page.cleanup.destroy();
    });
  </script>
</body>
</html>
