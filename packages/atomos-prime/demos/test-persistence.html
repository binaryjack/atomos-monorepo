<!DOCTYPE html>
<html>
<head>
  <title>Persistence Test</title>
  <style>
    body { font-family: monospace; padding: 20px; }
    button { margin: 5px; padding: 10px; }
    #output { background: #f0f0f0; padding: 10px; margin-top: 10px; white-space: pre-wrap; }
    .success { color: green; }
    .error { color: red; }
  </style>
<script type="importmap">{`n"imports":{`n"@binaryjack/formular.dev":"/formular-dev/dist/formular-dev.es.js",`n"@atomos/structura-core":"/atomos-structura-core/dist/index.js",`n"@atomos/prime-style":"/atomos-prime-style/dist/index.js"`n}`n}</script></head>
<body>
  <h1>Persistence Test</h1>
  
  <button onclick="clearStorage()">Clear localStorage</button>
  <button onclick="createEntity()">Create Entity</button>
  <button onclick="updateEntity()">Update Entity Name</button>
  <button onclick="addProperty()">Add Property</button>
  <button onclick="updateValidation()">Update Validation</button>
  <button onclick="checkStorage()">Check localStorage</button>
  <button onclick="reload()">Reload Page</button>
  
  <div id="output"></div>
  
  <script type="module">
    import { createAppStore } from '/atomos-prime/dist/core/create-app-store.js';
    import { createEntity } from '../vbs-mod/dist/index.js';
    
    let appStore, schemaStore, testEntityId = 'test-entity-1';
    
    function log(msg, type = 'info') {
      const output = document.getElementById('output');
      const line = document.createElement('div');
      line.className = type;
      line.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
      output.appendChild(line);
      output.scrollTop = output.scrollHeight;
    }
    
    function init() {
      appStore = createAppStore();
      const schemaId = appStore.appSignal.value.activeSchemaId;
      schemaStore = appStore.getSchemaStore(schemaId);
      log('App initialized, schema: ' + schemaId);
      
      // Check if entity exists from previous session
      const existing = schemaStore.signal.value.entities.find(e => e.id === testEntityId);
      if (existing) {
        log('Found existing entity: ' + existing.name, 'success');
        log('  Properties: ' + existing.properties.length);
      }
    }
    
    window.clearStorage = () => {
      localStorage.clear();
      log('localStorage cleared');
      location.reload();
    };
    
    window.createEntity = () => {
      const entity = createEntity({
        id: testEntityId,
        code: testEntityId,
        name: 'Test Entity',
      });
      schemaStore.addEntity(entity);
      log('Entity created: ' + entity.name);
    };
    
    window.updateEntity = () => {
      const entityStore = schemaStore.getEntityStore(testEntityId);
      if (!entityStore) {
        log('Entity not found!', 'error');
        return;
      }
      const newName = 'Updated at ' + new Date().toLocaleTimeString();
      entityStore.updateLabel(newName);
      log('Entity name updated to: ' + newName);
    };
    
    window.addProperty = () => {
      const entityStore = schemaStore.getEntityStore(testEntityId);
      if (!entityStore) {
        log('Entity not found!', 'error');
        return;
      }
      const prop = {
        key: 'prop-' + Date.now(),
        label: 'Property ' + Date.now(),
        value: 'test value',
        dataType: 'string',
        componentType: 'input',
      };
      entityStore.addProperty(prop);
      log('Property added: ' + prop.key);
    };
    
    window.updateValidation = () => {
      const entityStore = schemaStore.getEntityStore(testEntityId);
      if (!entityStore) {
        log('Entity not found!', 'error');
        return;
      }
      const entity = entityStore.signal.value;
      if (entity.properties.length === 0) {
        log('No properties to update!', 'error');
        return;
      }
      const updated = {
        ...entity,
        properties: entity.properties.map((p, i) => 
          i === 0 ? { ...p, validation: { required: { value: true } } } : p
        ),
        updatedAt: Date.now(),
      };
      entityStore.signal.set(updated);
      log('Validation updated on first property');
    };
    
    window.checkStorage = () => {
      log('--- localStorage contents ---');
      const schemas = localStorage.getItem('vbe2:schemas');
      if (schemas) {
        const parsed = JSON.parse(schemas);
        log('Schemas: ' + JSON.stringify(parsed, null, 2));
      } else {
        log('No schemas in localStorage!', 'error');
      }
    };
    
    window.reload = () => {
      log('Reloading in 1 second...');
      setTimeout(() => location.reload(), 1000);
    };
    
    init();
  </script>
</body>
</html>
