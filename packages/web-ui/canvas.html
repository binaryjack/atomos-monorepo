<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VBS Canvas</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0f172a; }
  </style>
</head>
<body>
  <nav style="position:fixed;top:0;left:0;right:0;z-index:999;background:rgba(15,23,42,0.92);backdrop-filter:blur(8px);border-bottom:1px solid #1e293b;display:flex;align-items:center;gap:8px;padding:0 16px;height:40px;font-family:system-ui,sans-serif;font-size:13px;pointer-events:auto;">
    <span style="font-weight:700;color:#f1f5f9;margin-right:8px;">VBS</span>
    <a href="preview.html" style="color:#94a3b8;text-decoration:none;padding:4px 10px;border-radius:6px;" onmouseover="this.style.background='#1e293b'" onmouseout="this.style.background=''">Components</a>
    <a href="canvas.html" style="color:#38bdf8;text-decoration:none;font-weight:500;padding:4px 10px;border-radius:6px;background:#0f2744;">Canvas</a>
    <a href="modal.html" style="color:#94a3b8;text-decoration:none;padding:4px 10px;border-radius:6px;" onmouseover="this.style.background='#1e293b'" onmouseout="this.style.background=''">Modal</a>
  </nav>
  <div id="canvas-root"></div>
  <script type="module">
    import { createCanvasPage } from './dist/preview/create-canvas-page.js';

    const page = createCanvasPage();
    document.getElementById('canvas-root').appendChild(page.element);

    window.addEventListener('beforeunload', () => page.cleanup.destroy());
  </script>
</body>
</html>
