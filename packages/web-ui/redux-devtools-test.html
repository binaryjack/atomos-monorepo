<!DOCTYPE html>
<html>
<head>
  <title>Redux DevTools Test</title>
</head>
<body>
  <h1>Redux DevTools Integration Test</h1>
  <button onclick="testStore()">Test Store Actions</button>
  <div id="output"></div>

  <script type="module">
    import { createStore } from './src/redux-store.js';

    // Create the main store
    const store = createStore();
    console.log('Store created:', store);

    // Test function
    window.testStore = function() {
      const output = document.getElementById('output');
      
      // Test basic actions
      console.log('Testing store actions...');
      
      // Add an entity
      store.dispatch({
        type: 'entity/add',
        payload: {
          id: 'test-entity-1',
          position: { x: 100, y: 100 },
          dimensions: { width: 200, height: 150 },
          data: { name: 'Test Entity' }
        }
      });
      
      // Update entity
      store.dispatch({
        type: 'entity/update',
        payload: {
          id: 'test-entity-1',
          changes: { position: { x: 200, y: 150 } }
        }
      });
      
      // Update viewport
      store.dispatch({
        type: 'viewport/update',
        payload: { zoom: 1.5, panX: 50, panY: 25 }
      });
      
      const state = store.getState();
      output.innerHTML = `
        <h3>Current State:</h3>
        <pre>${JSON.stringify(state, null, 2)}</pre>
        <p>Check Redux DevTools extension to see the actions!</p>
      `;
      
      console.log('Current state:', state);
      console.log('✅ Actions dispatched - check Redux DevTools!');
    };
    
    console.log('Test page ready. Click the button to test Redux DevTools integration!');
  </script>
</body>
</html>
