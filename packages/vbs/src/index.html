<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VBS Schema Builder</title>
  <link rel="stylesheet" href="../node_modules/@vbs/vbs-style/dist/styles.css">
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background-color: #f8fafc;
    }
    
    .vbs-toolbar {
      background: white;
      border-bottom: 1px solid #e2e8f0;
      padding: 1rem;
      display: flex;
      gap: 1rem;
      align-items: center;
    }
    
    .vbs-button {
      padding: 0.5rem 1rem;
      border: 1px solid #d1d5db;
      border-radius: 0.375rem;
      background: white;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .vbs-button:hover {
      background: #f9fafb;
      border-color: #9ca3af;
    }
    
    .vbs-main {
      height: calc(100vh - 80px);
      position: relative;
    }
  </style>
</head>
<body>
  <div class="vbs-toolbar">
    <button class="vbs-button" id="add-entity">Add Entity</button>
    <button class="vbs-button" id="add-link">Add Link</button>
    <button class="vbs-button" id="save-schema">Save Schema</button>
    <button class="vbs-button" id="load-schema">Load Schema</button>
  </div>
  
  <div class="vbs-main" id="schema-builder-container">
    <!-- Schema builder will be initialized here -->
  </div>
  
  <script type="module" src="./main.ts"></script>
</body>
</html>
