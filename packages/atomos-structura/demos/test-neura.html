<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Structura Neura Demo</title>
  <style>
    body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #111; }
    #neura-container { width: 100%; height: 100%; position: relative; }
    canvas { display: block; width: 100%; height: 100%; }
    .overlay { position: absolute; top: 10px; left: 10px; color: white; font-family: sans-serif; pointer-events: none; }
  </style>
  <script type="importmap">
  {
    "imports": {
      "@atomos-web/prime": "/atomos-prime/dist/index.js",
      "@atomos-web/prime-style": "/atomos-prime-style/dist/index.js",
      "@atomos-web/structura-core": "/atomos-structura-core/dist/index.js",
      "@atomos-web/structura": "/atomos-structura/dist/index.js",
      "@binaryjack/formular.dev": "/formular-dev/dist/formular-dev.mjs"
    }
  }
  </script>
</head>
<body>
  <div id="neura-container">
    <canvas id="neura-canvas"></canvas>
    <div class="overlay">
      <h2>Structura Neura</h2>
      <p>Pan (Drag) and Zoom (Scroll) to test high-density WebGL rendering.</p>
    </div>
  </div>

  <script type="module">
    import { createNeuraInstance } from '../dist/neura/create-neura-instance.js?v=9';

    const canvas = document.getElementById('neura-canvas');
    const workerUrl = new URL('../dist/neura/physics/worker.js?v=9', window.location.href);

    const neura = createNeuraInstance(canvas, workerUrl);

    // Generate 150 nodes for high density test
    console.log("Generating 150 mock nodes...");
    neura.generateMockData(150);
    console.log("Mock data loaded.");
  </script>
</body>
</html>
