<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <!--
    Content-Security-Policy for VS Code webviews.
    Replace ${webview.cspSource} and ${nonce} with the values provided by the VS Code API.
    See: https://code.visualstudio.com/api/extension-guides/webview#content-security-policy
  -->
  <meta
    http-equiv="Content-Security-Policy"
    content="default-src 'none';
             style-src ${webview.cspSource} 'unsafe-inline';
             script-src ${webview.cspSource} 'nonce-${nonce}';
             connect-src http://localhost:* ws://localhost:*;"
  />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Structura Canvas</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #app { height: 100%; width: 100%; overflow: hidden; }
    body { background: var(--vbs-color-surface-base, #0f0f0f); }
  </style>
</head>
<body>
  <div id="app"></div>

  <!--
    REPLACE the script src with the URI to the dist file in your extension:
      const scriptUri = webview.asWebviewUri(
        vscode.Uri.joinPath(extensionUri, 'node_modules', '@atomos-web', 'structura', 'dist', 'webview', 'index.js')
      )
  -->
  <script type="module" nonce="${nonce}">
    import { initializeStructuraWebview } from '${scriptUri}'

    initializeStructuraWebview({
      containerId: 'app',
      mcpServerUrl: '${mcpUrl}',
      schemaId: '${schemaId}',
    }).catch(err => console.error('[Structura] init failed', err))
  </script>
</body>
</html>
