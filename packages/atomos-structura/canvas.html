<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" href="data:,">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VBS Canvas</title>
  <link rel="stylesheet" href="/atomos-prime-style/dist/styles.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0f172a; }
  </style>
  <script type="importmap">
  {
    "imports": {
      "@atomos-web/prime": "/atomos-prime/dist/index.js",
      "@atomos-web/prime-style": "/atomos-prime-style/dist/index.js",
      "@atomos-web/structura-core": "/atomos-structura-core/dist/index.js",
      "@atomos-web/structura": "/atomos-structura/dist/index.js",
      "@binaryjack/formular.dev": "/formular-dev/dist/formular-dev.mjs"
    }
  }
  </script>
</head>
<body>
  
  <div id="canvas-root"></div>
  <script type="module">
    import { createCanvasPage } from '/atomos-structura/dist/preview/create-canvas-page.js';
    import { getEntityManager } from '/atomos-structura/dist/core/presentation/entity-manager.js';
    import { createSchemaGraphKernel } from '/atomos-structura/dist/core/create-schema-graph-kernel.js';
    import { createKernelAdapter } from '/atomos-structura/dist/adapters/create-kernel-adapter.js';

    console.log('🚀 Starting canvas with Kernel bridge');
    const page = createCanvasPage('demo-canvas');
    document.getElementById('canvas-root').appendChild(page.element);

    // Boot the headless schema kernel
    const kernel = createSchemaGraphKernel();

    // Wire the kernel to the existing UI EntityManager (non-breaking bridge)
    const bridge = createKernelAdapter(kernel, getEntityManager('demo-canvas'));

    // Expose for console / DevTools debugging
    window.__kernel = kernel;
    window.__bridge = bridge;

    window.addEventListener('beforeunload', () => {
      bridge.destroy();
      page.cleanup.destroy();
    });
  </script>
</body>
</html>
