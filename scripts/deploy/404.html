<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Redirecting...</title>
  <script type="text/javascript">
    // Get the base path from the URL. For a GitHub Project Page like
    // https://binaryjack.github.io/atomos-monorepo/, the base path is /atomos-monorepo.
    // We need to extract this dynamically.
    const pathSegments = window.location.pathname.split('/');
    // Assuming the repo name is always the second segment (after username.github.io)
    // For example: /atomos-monorepo/some-path -> atomos-monorepo
    const repoName = pathSegments[1];
    const basePath = repoName ? `/${repoName}` : '';

    // Construct the full path to redirect to, including the base path
    // and the original path.
    const redirectPath = `${basePath}${window.location.pathname}${window.location.search}${window.location.hash}`;
    window.location.replace(redirectPath);
  </script>
</head>
<body>
  <p>Redirecting to <script type="text/javascript">document.write(window.location.href)</script>...</p>
</body>
</html>
